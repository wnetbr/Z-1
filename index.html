<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.Share | P2P Transfer</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #007AFF; /* Apple Blue */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #1e1e2e, #000);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-weight: 300; letter-spacing: -1px; margin-bottom: 30px; }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 60px 20px;
            transition: 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            border-color: var(--accent);
            background: rgba(0, 122, 255, 0.05);
        }

        .status-container {
            margin-top: 20px;
            font-size: 0.9em;
            color: #ccc;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.1s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.95); }

        input[type="file"] { display: none; }

        .peer-id {
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.1em;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>W.Share</h1>
        
        <div id="setup">
            <p>Seu ID para conexão:</p>
            <div class="peer-id" id="my-id">Gerando...</div>
            <br>
            <input type="text" id="remote-id" placeholder="ID do destinatário" 
                   style="background: transparent; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; width: 80%; margin-bottom: 10px;">
            <br>
            <button class="btn-primary" onclick="connectToPeer()">Conectar</button>
        </div>

        <div id="transfer-area" style="display:none;">
            <div class="drop-zone" onclick="document.getElementById('file-input').click()">
                <p>Arraste mídias ou apps aqui</p>
                <small>ou clique para selecionar</small>
            </div>
            <input type="file" id="file-input">
            
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            
            <div class="status-container" id="status">Conectado e pronto.</div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let conn;
        const myIdDisplay = document.getElementById('my-id');
        const statusDisplay = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');

        // Inicializa o Peer
        peer = new Peer();

        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
        });

        // Aguarda conexão de entrada
        peer.on('connection', (connection) => {
            conn = connection;
            setupConnection();
        });

        function connectToPeer() {
            const remoteId = document.getElementById('remote-id').value;
            if (!remoteId) return alert("Insira um ID!");
            
            conn = peer.connect(remoteId);
            setupConnection();
        }

        function setupConnection() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('transfer-area').style.display = 'block';

            conn.on('open', () => {
                statusDisplay.innerText = "Conexão estabelecida!";
            });

            // Receber arquivo
            conn.on('data', (data) => {
                if (data.file) {
                    const blob = new Blob([data.file], { type: data.type });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = data.name;
                    a.click();
                    statusDisplay.innerText = "Arquivo recebido: " + data.name;
                }
            });
        }

        // Lógica de envio de arquivo
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusDisplay.innerText = "Enviando: " + file.name;
            progressContainer.style.display = 'block';
            progressBar.style.width = '100%'; // WebRTC DataChannel simples

            // Envia o arquivo como um Blob/ArrayBuffer
            conn.send({
                file: file,
                name: file.name,
                type: file.type
            });

            setTimeout(() => {
                statusDisplay.innerText = "Enviado com sucesso!";
                progressBar.style.width = '0%';
            }, 2000);
        };
    </script>
</body>
</html>
